<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Event Admin</title>
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/admin.css" />
</head>

<body>
  <main class="adminShell">
    <section class="adminHeader">
      <div>
        <p class="eyebrow">Host Dashboard 05.11.6:26</p>
        <h1 id="adminTitle">Event Admin</h1>
        <p class="muted">Update the live banner, NOW/NEXT, and live update cards.</p>
      </div>
    </section>

    <section class="adminGrid" id="adminUpdateArea">
      <div class="adminCard">

        <form id="liveForm">
          <h2>Admin Access</h2>
          <label>Admin Secret <input id="adminSecret" type="password" placeholder="ADMIN_SECRET" required /></label>

          <h2>Live Host Updates</h2>
          <label>Top Banner <textarea id="liveBanner" rows="2"></textarea></label>
          <label>Now <textarea id="liveNow" rows="2"></textarea></label>
          <label>Next <textarea id="liveNext" rows="2"></textarea></label>

          <button class="btn btn--primary" type="submit">Save Live Updates Now</button>
        </form>
        <a class="btn btn--primary" id="viewInvite">View Invite</a>
      </div>
      <div class="adminCard" id="adminStatusArea">
        <h2>Status</h2>
        <p>Guests will see updates automatically when the page refreshes.</p>

        <div id="saveStatus" class="statusMessage">
          Ready to save updates.
        </div>

        <hr />
        <h2>RSVPs</h2>
        <div class="statusMessage" id="rsvpStatus">
          Loading RSVPs...
        </div>

        <button class="btn btn--ghost" id="refreshRsvps" type="button">
          Refresh RSVPs
        </button>

        <div class="rsvpGroups" id="rsvpGroups">
          <details class="rsvpGroup">
            <summary>Loading RSVPs...</summary>
          </details>
        </div>

      </div>
    </section>



  </main>

  <script type="module" src="./core/admin-main.js"></script>
</body>

</html>
